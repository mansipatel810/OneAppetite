spring.application.name=OneAppetite
server.port=8081

spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&trustServerCertificate=true&ssl-mode=REQUIRED&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# This tells Spring NOT to ping the DB until the app is fully started
spring.datasource.hikari.initialization-fail-timeout=-1
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.admin.registration-secret=OA-ADMIN-SECRET-2026

app.cors.allowed-origins=http://localhost:4200

app.wallet.daily-topup-cap=100000.0

app.auth.rate-limit.max-requests=5
app.auth.rate-limit.window-seconds=60

server.error.include-stacktrace=never
server.error.include-exception=false
server.error.include-message=always
